#
name: Build and publish RK3588 image

on:
  workflow_dispatch:
    inputs:
      dockerfile:
        description: 'Dockerfile name'
        required: false
        default: 'Dockerfile.rk'
        type: string
      tag:
        description: 'Docker image tag'
        required: false
        default: 'rk'
        type: string
      torch_whl:
        description: 'Optional torch wheel URL or path (leave empty to skip)'
        required: false
        default: ''
        type: string
      onnxruntime_whl:
        description: 'Optional onnxruntime wheel URL or path (leave empty to skip)'
        required: false
        default: ''
        type: string
      rknn_toolkit_lite2_whl:
        description: 'Optional rknn-toolkit-lite2 wheel URL or path (leave empty to skip)'
        required: false
        default: ''
        type: string
      ffmpeg_rk_image:
        description: 'Optional ffmpeg RK base image (leave empty to default to ghcr.io/<repo_owner>/video-ba-pipe-ffmpeg-rk:rkmpp)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push RK3588 image
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        env:
          DEFAULT_FFMPEG_RK_IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/video-ba-pipe-ffmpeg-rk:rkmpp
        with:
          context: .
          file: ./${{ github.event.inputs.dockerfile }}
          platforms: linux/arm64
          pull: true
          push: true
          build-args: |
            TORCH_WHL=${{ github.event.inputs.torch_whl }}
            ONNXRUNTIME_WHL=${{ github.event.inputs.onnxruntime_whl }}
            RKNN_TOOLKIT_LITE2_WHL=${{ github.event.inputs.rknn_toolkit_lite2_whl }}
            FFMPEG_RK_IMAGE=${{ github.event.inputs.ffmpeg_rk_image != '' && github.event.inputs.ffmpeg_rk_image || env.DEFAULT_FFMPEG_RK_IMAGE }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
