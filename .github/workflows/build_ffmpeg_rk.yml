name: Build and publish RK3588 FFmpeg image

on:
  workflow_dispatch:
    inputs:
      dockerfile:
        description: 'Dockerfile name'
        required: false
        default: 'Dockerfile.ffmpeg.rk'
        type: string
      image_name:
        description: 'Container image name'
        required: false
        default: 'video-ba-pipe-ffmpeg-rk'
        type: string
      tag:
        description: 'Docker image tag'
        required: false
        default: 'rkmpp'
        type: string
      ffmpeg_rk_package:
        description: 'Optional prebuilt ffmpeg package URL for RK/rkmpp (leave empty to use vendored package or Debian ffmpeg fallback)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push RK3588 FFmpeg image
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          file: ./${{ github.event.inputs.dockerfile }}
          platforms: linux/arm64
          push: true
          build-args: |
            FFMPEG_RK_PACKAGE=${{ github.event.inputs.ffmpeg_rk_package }}
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.inputs.image_name }}:${{ github.event.inputs.tag }}
