name: Build and publish RK3588 FFmpeg image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Container image name'
        required: false
        default: 'video-ba-pipe-ffmpeg-rk'
        type: string
      tag:
        description: 'Docker image tag'
        required: false
        default: 'rkmpp'
        type: string
      ffmpeg_rk_package:
        description: 'Optional prebuilt ffmpeg package URL for RK/rkmpp (leave empty to use vendored package or Debian ffmpeg fallback)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for FFmpeg image
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.inputs.image_name }}
          tags: |
            type=raw,value=${{ github.event.inputs.tag }}
            type=sha,prefix=sha-

      - name: Build and push RK3588 FFmpeg image
        id: build
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          file: ./Dockerfile.ffmpeg.rk
          platforms: linux/arm64
          pull: true
          push: true
          build-args: |
            FFMPEG_RK_PACKAGE=${{ github.event.inputs.ffmpeg_rk_package }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Print published image references
        run: |
          echo "Revision: ${{ github.sha }}"
          echo "Digest:   ${{ steps.build.outputs.digest }}"
          echo "Tags:"
          printf '%s\n' "${{ steps.meta.outputs.tags }}"
